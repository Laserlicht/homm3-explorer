<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HoMM3 File Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Top Navigation -->
        <header id="header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">⚔️</span>
                    <span class="logo-text">HoMM3 Explorer</span>
                </div>
            </div>
            <nav class="header-nav">
                <button class="nav-btn active" data-mode="explorer" title="File Explorer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>Explorer</span>
                </button>
                <button class="nav-btn" data-mode="defviewer" title="DEF Animation Viewer">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <span>Animations</span>
                </button>
            </nav>
            <div class="header-right">
                <button id="btn-open-file" class="action-btn" title="Open Local File">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    Open File
                </button>
                <button id="btn-download-demo" class="action-btn accent" title="Download HoMM3 Demo Files">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Demo
                </button>
                <input type="file" id="file-input" accept=".lod,.pak,.def,.pcx,.run,.exe" multiple style="display:none">
                <input type="file" id="bin-input" accept=".bin" style="display:none">
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Welcome Screen -->
            <div id="welcome-screen" class="screen active">
                <div class="welcome-content">
                    <div class="welcome-icon">🏰</div>
                    <h1>Heroes of Might & Magic III</h1>
                    <h2>File Explorer</h2>
                    <p class="welcome-desc">Load LOD, PAK, DEF, or PCX files from your disk — or download the free demo files to get started.</p>
                    <div class="welcome-actions">
                        <button id="welcome-open" class="welcome-btn primary">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            Open Local File
                        </button>
                        <button id="welcome-demo" class="welcome-btn secondary">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                            Download Demo Files
                        </button>
                    </div>
                    <div class="welcome-formats">
                        <span class="format-badge">.LOD</span>
                        <span class="format-badge">.PAK</span>
                        <span class="format-badge">.DEF</span>
                        <span class="format-badge">.PCX</span>
                        <span class="format-badge">.EXE</span>
                    </div>
                </div>
            </div>

            <!-- Explorer Mode -->
            <div id="explorer-screen" class="screen">
                <div class="explorer-layout">
                    <!-- Left: File list -->
                    <div class="explorer-sidebar">
                        <div class="sidebar-header">
                            <div class="sidebar-title" id="archive-name">Files</div>
                            <select id="archive-select" class="archive-select" style="display:none"></select>
                            <div class="sidebar-controls">
                                <div class="view-toggle">
                                    <button class="view-btn active" data-view="list" title="List View">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                                    </button>
                                    <button class="view-btn" data-view="grid" title="Grid View">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                                    </button>
                                </div>
                                <div class="icon-size-control" id="icon-size-control" style="display:none">
                                    <label>Size</label>
                                    <input type="range" id="icon-size-slider" min="32" max="256" value="64" step="8">
                                </div>
                            </div>
                        </div>
                        <div class="search-bar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="file-search" placeholder="Filter files...">
                            <select id="ext-filter" class="ext-filter" title="Filter by extension">
                                <option value="">All</option>
                            </select>
                            <span id="file-count" class="file-count">0 files</span>
                        </div>
                        <div id="file-list" class="file-list list-view"></div>
                    </div>

                    <!-- Resize handle -->
                    <div class="resize-handle" id="explorer-resize-handle"></div>

                    <!-- Right: Preview -->
                    <div class="explorer-preview" id="explorer-preview">
                        <div class="preview-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            <p>Select a file to preview</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- DEF Animation Mode -->
            <div id="defviewer-screen" class="screen">
                <div class="defviewer-layout">
                    <div class="defviewer-sidebar">
                        <div class="sidebar-header">
                            <div class="sidebar-title">Animations</div>
                            <div class="sidebar-controls">
                                <div class="view-toggle">
                                    <button class="view-btn" data-view="list" data-target="def">☰</button>
                                    <button class="view-btn active" data-view="grid" data-target="def">⊞</button>
                                </div>
                                <button class="toggle-btn" id="def-anim-thumb-toggle" title="Animate thumbnails (may be slow)">▶ Anim</button>
                                <div class="icon-size-control def-size-control">
                                    <input type="range" id="def-icon-size-slider" min="32" max="256" value="64" step="8">
                                </div>
                            </div>
                        </div>
                        <div class="search-bar">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            <input type="text" id="def-search" placeholder="Filter DEF files...">
                        </div>
                        <div id="def-list" class="file-list grid-view"></div>
                    </div>
                    <div class="resize-handle" data-resize="defviewer"></div>
                    <div class="defviewer-main" id="defviewer-main">
                        <div class="preview-placeholder">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            <p>Select a DEF file to view animation</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay" style="display:none">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <div class="loading-text" id="loading-text">Loading...</div>
                <div class="loading-progress">
                    <div class="loading-progress-bar" id="loading-progress-bar"></div>
                </div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lzma@2.3.2/src/lzma_worker-min.js"></script>
    <script src="parsers.js"></script>
    <script src="lzma2.js"></script>
    <script src="innoextract.js"></script>
    <script src="app.js"></script>
</body>
</html>
